<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Agriculture - Login & Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        :root {
            --primary-color: #2ecc71;
            --secondary-color: #27ae60;
            --accent-color: #f39c12;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
        }

        body {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
            margin: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
        }

        .auth-header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 8px;
            display: block;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(46, 204, 113, 0.25);
        }

        .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 14px;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(46, 204, 113, 0.25);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            border: none;
            padding: 12px 20px;
            font-weight: 600;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
            color: white;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toggle-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-text {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .auth-footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 13px;
            color: #666;
        }

        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .spinner-small {
            width: 1.5rem;
            height: 1.5rem;
            border-width: 2px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Header -->
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-leaf"></i>
                </div>
                <h1>Smart Agriculture</h1>
                <p>Connected Farming Platform</p>
            </div>

            <!-- Body -->
            <div class="auth-body">
                <!-- Alert Messages -->
                <div id="alertContainer"></div>

                <!-- Tab Buttons -->
                <div class="toggle-tabs">
                    <button class="tab-btn active" onclick="switchTab('login')">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button class="tab-btn" onclick="switchTab('register')">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </div>

                <!-- Login Tab -->
                <div id="login" class="tab-content active">
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label class="form-label" for="loginEmail">
                                <i class="fas fa-envelope"></i> Email
                            </label>
                            <input type="email" class="form-control" id="loginEmail" name="email" 
                                   placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="loginPassword">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" class="form-control" id="loginPassword" name="password" 
                                   placeholder="Enter your password" required>
                        </div>

                        <div class="form-group form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary" id="loginBtn">
                            <span id="loginBtnText">Login</span>
                            <span id="loginSpinner" class="spinner-border spinner-small ms-2" style="display: none;"></span>
                        </button>

                        <p class="form-text mt-3 text-center">
                            Don't have an account? <a href="#register" onclick="switchTab('register')" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Register here</a>
                        </p>
                    </form>
                </div>

                <!-- Register Tab -->
                <div id="register" class="tab-content">
                    <form id="registerForm" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label class="form-label" for="registerUsername">
                                <i class="fas fa-user"></i> Username
                            </label>
                            <input type="text" class="form-control" id="registerUsername" name="username" 
                                   placeholder="Choose username" required minlength="3">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registerEmail">
                                <i class="fas fa-envelope"></i> Email
                            </label>
                            <input type="email" class="form-control" id="registerEmail" name="email" 
                                   placeholder="your@email.com" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registerPhone">
                                <i class="fas fa-phone"></i> Phone
                            </label>
                            <input type="tel" class="form-control" id="registerPhone" name="phone" 
                                   placeholder="+91 98765 43210">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registerPassword">
                                <i class="fas fa-lock"></i> Password
                            </label>
                            <input type="password" class="form-control" id="registerPassword" name="password" 
                                   placeholder="Create password" required minlength="6">
                            <small class="form-text">Minimum 6 characters</small>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="registerRole">
                                <i class="fas fa-briefcase"></i> Role
                            </label>
                            <select class="form-select" id="registerRole" name="role" required>
                                <option value="" disabled selected>Select your role</option>
                                <option value="Farmer">👨‍🌾 Farmer</option>
                                <option value="Expert">👨‍🔬 Agricultural Expert</option>
                                <option value="Admin">👨‍💼 Administrator</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary" id="registerBtn">
                            <span id="registerBtnText">Create Account</span>
                            <span id="registerSpinner" class="spinner-border spinner-small ms-2" style="display: none;"></span>
                        </button>

                        <p class="form-text mt-3 text-center">
                            Already have an account? <a href="#login" onclick="switchTab('login')" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Login here</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- Footer -->
            <div class="auth-footer">
                <i class="fas fa-shield-alt"></i> Your data is secure and encrypted
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        // Show alert
        function showAlert(message, type = 'success') {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type === 'error' ? 'danger' : type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alertDiv);

            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        // Login handler
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');

            // Show loading state
            loginBtn.disabled = true;
            loginBtnText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    showAlert('✅ Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Login failed. Please check credentials.', 'error');
                }
            } catch (error) {
                showAlert('❌ Connection error. Please try again.', 'error');
                console.error('Login error:', error);
            } finally {
                // Reset button
                loginBtn.disabled = false;
                loginBtnText.style.display = 'inline';
                loginSpinner.style.display = 'none';
            }
        }

        // Register handler
        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const phone = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;
            const role = document.getElementById('registerRole').value;
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnText = document.getElementById('registerBtnText');
            const registerSpinner = document.getElementById('registerSpinner');

            // Show loading state
            registerBtn.disabled = true;
            registerBtnText.style.display = 'none';
            registerSpinner.style.display = 'inline-block';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, email, phone, password, role })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✅ Account created successfully! Logging in...', 'success');
                    
                    // Auto-login
                    setTimeout(() => {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(data.message || 'Registration failed. Please try again.', 'error');
                }
            } catch (error) {
                showAlert('❌ Connection error. Please try again.', 'error');
                console.error('Register error:', error);
            } finally {
                // Reset button
                registerBtn.disabled = false;
                registerBtnText.style.display = 'inline';
                registerSpinner.style.display = 'none';
            }
        }

        // Set active tab button on page load
        window.addEventListener('load', () => {
            document.querySelector('.tab-btn').classList.add('active');
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
